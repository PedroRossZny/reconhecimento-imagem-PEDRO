<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teachable Machine</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #1f2937, #111827);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1f2937;
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      padding: 30px;
      width: 100%;
      max-width: 500px;
    }

    #webcam-container canvas {
      border-radius: 15px;
      width: 100%;
    }

    .btn-custom {
      background: linear-gradient(45deg, #3b82f6, #06b6d4);
      border: none;
      padding: 12px;
      font-weight: bold;
      border-radius: 12px;
      transition: 0.3s;
    }

    .btn-custom:hover {
      transform: scale(1.05);
      background: linear-gradient(45deg, #2563eb, #0891b2);
    }

    .progress {
      height: 20px;
      border-radius: 10px;
      background-color: #374151;
    }

    .progress-bar {
      font-size: 12px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card text-center">
    <h3 class="mb-3">Reconhecimento de Imagem</h3>

    <button class="btn btn-custom w-100 mb-3" onclick="init()">
      Ativar Câmera
    </button>

    <div id="webcam-container" class="mb-3"></div>

    <div id="label-container"></div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

  <script>
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();

      const flip = true;
      webcam = new tmImage.Webcam(300, 300, flip);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      document.getElementById("webcam-container").innerHTML = "";
      document.getElementById("webcam-container").appendChild(webcam.canvas);

      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = "";

      for (let i = 0; i < maxPredictions; i++) {
        const div = document.createElement("div");
        div.classList.add("mb-3");

        div.innerHTML = `
          <div class="d-flex justify-content-between mb-1">
            <span id="label-${i}">Classe</span>
            <span id="value-${i}">0%</span>
          </div>
          <div class="progress">
            <div id="bar-${i}" class="progress-bar bg-info" style="width: 0%"></div>
          </div>
        `;

        labelContainer.appendChild(div);
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      for (let i = 0; i < maxPredictions; i++) {
        const probability = (prediction[i].probability * 100).toFixed(1);

        document.getElementById(`label-${i}`).innerText = prediction[i].className;
        document.getElementById(`value-${i}`).innerText = probability + "%";
        document.getElementById(`bar-${i}`).style.width = probability + "%";
      }
    }
  </script>

</body>
</html>
